<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RankPulse - Live SERP Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f4f4f8;--surface:#ffffff;--border:#e5e7eb;--text:#111827;--text-muted:#6b7280;--primary:#667eea;--primary-end:#764ba2;--header-bg:#ffffff;--input-bg:#ffffff;--input-border:#d1d5db;--table-head:#f9fafb;--row-hover:#f3f4f6;--shadow:0 1px 4px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.1)}
    html.dark{--bg:#0f1117;--surface:#1a1d27;--border:#2d3141;--text:#f1f5f9;--text-muted:#94a3b8;--primary:#818cf8;--primary-end:#a78bfa;--header-bg:#1a1d27;--input-bg:#23263a;--input-border:#3a3f5c;--table-head:#23263a;--row-hover:#23263a;--shadow:0 1px 4px rgba(0,0,0,.3)}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
    .header{position:sticky;top:0;z-index:50;background:var(--header-bg);border-bottom:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;padding:0 24px;height:64px}
    .header-left{flex:1}.header-title{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--primary-end));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header-logo{position:absolute;left:50%;transform:translateX(-50%);height:32px;object-fit:contain}
    html.dark .header-logo{filter:invert(1)}
    .header-right{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:16px}
    .theme-toggle{display:flex;gap:4px;background:var(--table-head);border-radius:8px;padding:4px}
    .theme-btn{background:none;border:none;border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .theme-btn.active{background:var(--surface);box-shadow:var(--shadow)}
    .filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .filter-bar input,.filter-bar select{height:40px;padding:0 12px;border:1px solid var(--input-border);border-radius:8px;background:var(--input-bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .15s}
    .filter-bar input:focus,.filter-bar select:focus{border-color:var(--primary)}
    .filter-bar input[name=domain]{width:180px}.filter-bar input[name=keyword]{width:200px}.filter-bar select[name=country]{width:160px}.filter-bar input[name=apikey]{width:210px}
    .divider{width:1px;height:28px;background:var(--border);margin:0 4px}
    .btn{height:40px;padding:0 18px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s,transform .1s;white-space:nowrap}
    .btn:hover{opacity:.9;transform:translateY(-1px)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-end));color:#fff}
    .btn-secondary{background:var(--table-head);color:var(--text);border:1px solid var(--border)}
    .btn-save{background:#374151;color:#fff}.html.dark .btn-save{background:#4b5563}
    .btn-check{background:#16a34a;color:#fff;padding:0 10px;font-size:12px;height:30px;border-radius:6px}
    .btn-delete{background:#dc2626;color:#fff;padding:0 10px;font-size:12px;height:30px;border-radius:6px}
    .btn-sm{height:30px;padding:0 12px;font-size:12px}
    .main{padding:24px;max-width:1400px;margin:0 auto}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
    @media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:500px){.stats-grid{grid-template-columns:1fr}}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);border-left:4px solid transparent}
    .stat-card.c-total{border-left-color:var(--primary)}.stat-card.c-top3{border-left-color:#16a34a}.stat-card.c-top10{border-left-color:#2563eb}.stat-card.c-notfound{border-left-color:#dc2626}
    .stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:8px}
    .stat-value{font-size:32px;font-weight:700}
    .stat-card.c-total .stat-value{color:var(--primary)}.stat-card.c-top3 .stat-value{color:#16a34a}.stat-card.c-top10 .stat-value{color:#2563eb}.stat-card.c-notfound .stat-value{color:#dc2626}
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
    .table-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
    .table-card-title{font-size:16px;font-weight:600}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th{background:var(--table-head);padding:11px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
    td{padding:13px 16px;font-size:14px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--row-hover)}
    .empty-row td{text-align:center;padding:48px 16px;color:var(--text-muted)}
    .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600}
    .badge-1{background:linear-gradient(135deg,#ffd700,#ffed4e);color:#333}
    .badge-top3{background:#dcfce7;color:#15803d}.badge-top10{background:#dbeafe;color:#1d4ed8}.badge-other{background:#f3f4f6;color:#374151}
    html.dark .badge-top3{background:#14532d;color:#86efac}html.dark .badge-top10{background:#1e3a5f;color:#93c5fd}html.dark .badge-other{background:#374151;color:#e5e7eb}
    .badge-none{background:#fee2e2;color:#b91c1c}html.dark .badge-none{background:#7f1d1d;color:#fca5a5}
    .badge-pending{background:#fef3c7;color:#b45309}html.dark .badge-pending{background:#78350f;color:#fcd34d}
    .badge-checking{background:#f3f4f6;color:#374151;display:inline-flex;align-items:center;gap:6px}
    .spin{animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;color:#fff;opacity:0;transform:translateY(12px);pointer-events:none;transition:opacity .25s,transform .25s;z-index:999;max-width:340px}
    .toast.show{opacity:1;transform:translateY(0)}.toast.success{background:#16a34a}.toast.error{background:#dc2626}
    .actions-cell{display:flex;gap:6px}.keyword-cell{font-weight:600}.domain-cell{font-family:monospace;font-size:13px;color:var(--text-muted)}.time-cell{font-size:12px;color:var(--text-muted)}
  </style>
</head>
<body>
<header class="header">
  <div class="header-left"><span class="header-title">RankPulse</span></div>
  <img class="header-logo" src="https://assetscout.in/assets/images/Assetscout%20Logo%20Black.webp" alt="Asset Scout" onerror="this.style.display='none'">
  <div class="header-right">
    <div class="theme-toggle">
      <button class="theme-btn" id="btnLight" onclick="setTheme('light')" title="Light">☀️</button>
      <button class="theme-btn active" id="btnDark" onclick="setTheme('dark')" title="Dark">🌙</button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <input type="text" name="domain" id="inpDomain" placeholder="Domain (e.g. apple.com)">
  <input type="text" name="keyword" id="inpKeyword" placeholder="Keyword">
  <select name="country" id="inpCountry">
    <option value="us">🇺🇸 United States</option>
    <option value="gb">🇬🇧 United Kingdom</option>
    <option value="in">🇮🇳 India</option>
    <option value="ca">🇨🇦 Canada</option>
    <option value="au">🇦🇺 Australia</option>
    <option value="de">🇩🇪 Germany</option>
    <option value="fr">🇫🇷 France</option>
  </select>
  <button class="btn btn-primary" onclick="addTracker()"><i class="fas fa-search"></i> Add &amp; Check</button>
  <div class="divider"></div>
  <input type="password" name="apikey" id="inpApiKey" placeholder="SerpAPI Key">
  <button class="btn btn-save" onclick="saveApiKey()">Save Key</button>
</div>

<div class="main">
  <div class="stats-grid">
    <div class="stat-card c-total"><div class="stat-label">Total Trackers</div><div class="stat-value" id="statTotal">0</div></div>
    <div class="stat-card c-top3"><div class="stat-label">Top 3 Positions</div><div class="stat-value" id="statTop3">0</div></div>
    <div class="stat-card c-top10"><div class="stat-label">Top 10 Positions</div><div class="stat-value" id="statTop10">0</div></div>
    <div class="stat-card c-notfound"><div class="stat-label">Not Found (&gt;100)</div><div class="stat-value" id="statNotFound">0</div></div>
  </div>
  <div class="table-card">
    <div class="table-card-header">
      <span class="table-card-title">Rankings</span>
      <button class="btn btn-secondary btn-sm" onclick="refreshAll()"><i class="fas fa-sync-alt"></i> Refresh All</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Keyword</th><th>Domain</th><th>Country</th><th>Position</th><th>Last Checked</th><th>Actions</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  let trackers = [];
  let apiKey = '';
  let isRefreshing = false;

  function setTheme(t) {
    document.documentElement.classList.toggle('dark', t === 'dark');
    localStorage.setItem('rp_theme', t);
    document.getElementById('btnLight').classList.toggle('active', t === 'light');
    document.getElementById('btnDark').classList.toggle('active', t === 'dark');
  }
  (function(){ setTheme(localStorage.getItem('rp_theme') || 'dark'); })();

  let toastTimer;
  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = 'toast'; }, 3200);
  }

  function saveApiKey() {
    const k = document.getElementById('inpApiKey').value.trim();
    if (!k) { showToast('Enter a valid SerpAPI key', 'error'); return; }
    apiKey = k; localStorage.setItem('rp_apikey', k); showToast('API key saved');
  }

  const FLAGS = { us:'🇺🇸', gb:'🇬🇧', in:'🇮🇳', ca:'🇨🇦', au:'🇦🇺', de:'🇩🇪', fr:'🇫🇷' };
  function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function badge(pos) {
    if (pos === null) return '<span class="badge badge-pending"><i class="fas fa-clock"></i> Pending</span>';
    if (pos === 0)    return '<span class="badge badge-checking"><span class="spin">↻</span> Checking…</span>';
    if (pos === -1)   return '<span class="badge badge-none"><i class="fas fa-times"></i> Not in Top 100</span>';
    if (pos === 1)    return '<span class="badge badge-1"><i class="fas fa-crown"></i> #1</span>';
    if (pos <= 3)     return `<span class="badge badge-top3"><i class="fas fa-medal"></i> #${pos}</span>`;
    if (pos <= 10)    return `<span class="badge badge-top10"><i class="fas fa-chart-line"></i> #${pos}</span>`;
    return `<span class="badge badge-other">#${pos}</span>`;
  }

  function updateStats() {
    document.getElementById('statTotal').textContent    = trackers.length;
    document.getElementById('statTop3').textContent     = trackers.filter(t => t.position >= 1 && t.position <= 3).length;
    document.getElementById('statTop10').textContent    = trackers.filter(t => t.position >= 1 && t.position <= 10).length;
    document.getElementById('statNotFound').textContent = trackers.filter(t => t.position === -1).length;
  }

  function render() {
    const tbody = document.getElementById('tableBody');
    if (!trackers.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6"><i class="fas fa-search" style="margin-right:8px;opacity:.4"></i>No trackers yet. Add a domain and keyword above.</td></tr>';
    } else {
      tbody.innerHTML = trackers.map(t => `
        <tr>
          <td class="keyword-cell">${esc(t.keyword)}</td>
          <td class="domain-cell">${esc(t.domain)}</td>
          <td>${FLAGS[t.country] || '🌐'} ${t.country.toUpperCase()}</td>
          <td>${badge(t.position)}</td>
          <td class="time-cell">${t.checkedAt ? new Date(t.checkedAt).toLocaleString() : '—'}</td>
          <td class="actions-cell">
            <button class="btn btn-check" onclick="checkOne('${esc(t.id)}')"><i class="fas fa-sync-alt"></i> Check</button>
            <button class="btn btn-delete" onclick="deleteOne('${esc(t.id)}')"><i class="fas fa-trash"></i></button>
          </td>
        </tr>`).join('');
    }
    updateStats();
  }

  async function loadTrackers() {
    try {
      const res = await fetch('/api/trackers');
      trackers = await res.json();
      render();
    } catch (e) { showToast('Failed to load trackers', 'error'); }
  }

  async function addTracker() {
    let domain  = document.getElementById('inpDomain').value.trim();
    let keyword = document.getElementById('inpKeyword').value.trim();
    let country = document.getElementById('inpCountry').value;
    if (!domain || !keyword) { showToast('Enter domain and keyword', 'error'); return; }
    domain = domain.replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0].toLowerCase();

    const res = await fetch('/api/trackers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain, keyword, country }),
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Error adding tracker', 'error'); return; }

    trackers.push(data);
    render();
    document.getElementById('inpKeyword').value = '';
    showToast('Tracker added');
    if (apiKey) await checkOne(data.id);
    else showToast('Save a SerpAPI key to check rankings', 'error');
  }

  async function deleteOne(id) {
    const res = await fetch(`/api/trackers/${id}`, { method: 'DELETE' });
    if (!res.ok) { showToast('Error deleting tracker', 'error'); return; }
    trackers = trackers.filter(t => t.id !== id);
    render(); showToast('Tracker removed');
  }

  async function checkOne(id) {
    if (!apiKey) { showToast('Save a SerpAPI key first', 'error'); return; }
    const t = trackers.find(x => x.id === id);
    if (!t) return;
    t.position = 0; render();
    try {
      const res = await fetch(`/api/trackers/${id}/check`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'API error');
      Object.assign(t, data);
      render();
      showToast(t.position === -1 ? `"${t.keyword}" not in top 100` : `"${t.keyword}" → position #${t.position}`);
    } catch (err) {
      t.position = null; render(); showToast(err.message, 'error');
    }
  }

  async function refreshAll() {
    if (!apiKey) { showToast('Save a SerpAPI key first', 'error'); return; }
    if (isRefreshing) { showToast('Already refreshing…', 'error'); return; }
    if (!trackers.length) { showToast('No trackers to refresh', 'error'); return; }
    isRefreshing = true;
    trackers.forEach(t => { t.position = 0; }); render();
    showToast(`Checking ${trackers.length} keywords…`);
    try {
      const res = await fetch('/api/trackers/check-all', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey }),
      });
      const updated = await res.json();
      if (Array.isArray(updated)) { trackers = updated; render(); }
      showToast('All rankings updated');
    } catch (e) { showToast('Refresh failed', 'error'); }
    isRefreshing = false;
  }

  document.getElementById('inpApiKey').value = apiKey = localStorage.getItem('rp_apikey') || '';
  document.getElementById('inpKeyword').addEventListener('keypress', e => { if (e.key === 'Enter') addTracker(); });
  document.getElementById('inpDomain').addEventListener('keypress', e => { if (e.key === 'Enter') addTracker(); });

  loadTrackers();
</script>
</body>
</html>
