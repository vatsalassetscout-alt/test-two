<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RankPulse - Live SERP Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f4f4f8;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --primary: #667eea;
      --primary-end: #764ba2;
      --header-bg: #ffffff;
      --input-bg: #ffffff;
      --input-border: #d1d5db;
      --table-head: #f9fafb;
      --row-hover: #f3f4f6;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
      --overlay: rgba(0,0,0,0.35);
    }
    html.dark {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2d3141;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #818cf8;
      --primary-end: #a78bfa;
      --header-bg: #1a1d27;
      --input-bg: #23263a;
      --input-border: #3a3f5c;
      --table-head: #23263a;
      --row-hover: #23263a;
      --shadow: 0 1px 4px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --overlay: rgba(0,0,0,0.6);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── HEADER ── */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex; align-items: center;
      padding: 0 24px; height: 64px;
    }
    .header-left { flex: 1; }
    .header-title {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-end));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-logo {
      position: absolute; left: 50%; transform: translateX(-50%);
      height: 32px; object-fit: contain;
    }
    html.dark .header-logo { filter: invert(1); }
    .header-right {
      flex: 1; display: flex; align-items: center;
      justify-content: flex-end; gap: 16px;
    }
    .web-btn {
      font-size: 14px; font-weight: 500; color: var(--text);
      text-decoration: none; padding: 6px 14px;
      border-radius: 8px; border: 1px solid var(--border);
      transition: background 0.15s;
    }
    .web-btn:hover { background: var(--row-hover); }
    .theme-toggle {
      display: flex; gap: 4px;
      background: var(--table-head); border-radius: 8px; padding: 4px;
    }
    .theme-btn {
      background: none; border: none; border-radius: 6px;
      width: 30px; height: 30px; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .theme-btn.active { background: var(--surface); box-shadow: var(--shadow); }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .filter-bar input, .filter-bar select {
      height: 40px; padding: 0 12px;
      border: 1px solid var(--input-border); border-radius: 8px;
      background: var(--input-bg); color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border 0.15s;
    }
    .filter-bar input:focus, .filter-bar select:focus { border-color: var(--primary); }
    #inpDomain  { width: 180px; }
    #inpKeyword { width: 200px; }
    #inpCountry { width: 160px; }
    .key-wrap {
      margin-left: auto; display: flex; align-items: center; gap: 8px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); padding: 4px 4px 4px 10px;
    }
    .key-status { font-size: 16px; }
    #inpApiKey {
      width: 200px; height: 32px; padding: 0 8px;
      border: none; background: transparent; color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
    }
    .divider { width: 1px; height: 28px; background: var(--border); }

    /* ── BUTTONS ── */
    .btn {
      height: 40px; padding: 0 18px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      display: inline-flex; align-items: center; gap: 6px;
      transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-end)); color: #fff; }
    .btn-secondary { background: var(--table-head); color: var(--text); border: 1px solid var(--border); }
    .btn-save { background: #374151; color: #fff; height: 32px; padding: 0 14px; font-size: 13px; border-radius: 6px; }
    html.dark .btn-save { background: #4b5563; }
    .btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }
    .btn-icon { height: 32px; width: 32px; padding: 0; border-radius: 6px; justify-content: center; font-size: 15px; }
    .btn-danger { background: #fee2e2; color: #b91c1c; border: none; }
    html.dark .btn-danger { background: #7f1d1d; color: #fca5a5; }
    .btn-ghost { background: var(--table-head); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-add-kw { background: linear-gradient(135deg, var(--primary), var(--primary-end)); color: #fff; height: 38px; padding: 0 16px; font-size: 14px; font-weight: 600; }

    /* ── MAIN ── */
    .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* ── STAT CARDS ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px;
    }
    @media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:500px){.stats-grid{grid-template-columns:1fr;}}
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; box-shadow: var(--shadow);
      border-left: 4px solid transparent;
    }
    .stat-card.c-domains  { border-left-color: #7c3aed; }
    .stat-card.c-keywords { border-left-color: #0ea5e9; }
    .stat-card.c-top1     { border-left-color: #eab308; }
    .stat-card.c-top10    { border-left-color: #2563eb; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing:.05em; color: var(--text-muted); margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; }
    .stat-card.c-domains  .stat-value { color: #7c3aed; }
    .stat-card.c-keywords .stat-value { color: #0ea5e9; }
    .stat-card.c-top1     .stat-value { color: #eab308; }
    .stat-card.c-top10    .stat-value { color: #2563eb; }

    /* ── TABLE CARD ── */
    .table-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow); overflow: hidden;
    }
    .table-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .table-card-title { font-size: 16px; font-weight: 600; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--table-head); padding: 11px 16px; text-align: left;
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing:.04em; border-bottom: 1px solid var(--border);
    }
    td {
      padding: 13px 16px; font-size: 14px;
      border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    .domain-row { cursor: pointer; }
    .domain-row:hover td { background: var(--row-hover); }
    .empty-row td { text-align: center; padding: 48px 16px; color: var(--text-muted); }

    .domain-name { display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .domain-icon { opacity: .5; font-size: 15px; }
    .chevron { opacity: 0; font-size: 13px; color: var(--text-muted); transition: opacity .15s; }
    .domain-row:hover .chevron { opacity: 1; }
    .kw-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 13px; font-weight: 600;
      background: var(--table-head); color: var(--text-muted); border: 1px solid var(--border); font-family: monospace;
    }
    .pos-text { font-weight: 700; font-size: 14px; }
    .pos-dash { color: var(--text-muted); }
    .pos-notfound { color: #dc2626; font-size: 13px; }
    .pos-pending { color: #b45309; font-size: 13px; }
    .time-cell { font-size: 12px; color: var(--text-muted); }
    .actions-cell { display: flex; gap: 6px; justify-content: flex-end; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500;
      color: #fff; opacity: 0; transform: translateY(12px);
      pointer-events: none; transition: opacity .25s, transform .25s; z-index: 9999; max-width: 340px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #16a34a; }
    .toast.error   { background: #dc2626; }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: var(--overlay); align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; box-shadow: var(--shadow-lg);
      width: 100%; max-width: 820px; max-height: 82vh;
      display: flex; flex-direction: column; overflow: hidden;
      animation: modalIn .18s ease;
    }
    @keyframes modalIn { from { opacity:0; transform: scale(.96) translateY(8px); } to { opacity:1; transform: none; } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 700;
    }
    .modal-domain-icon { font-size: 20px; opacity: .55; }
    .modal-close {
      background: none; border: none; cursor: pointer; font-size: 22px;
      color: var(--text-muted); line-height: 1; padding: 4px 8px; border-radius: 6px;
      transition: background .15s;
    }
    .modal-close:hover { background: var(--row-hover); color: var(--text); }

    /* Add keyword row inside modal */
    .modal-add-row {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
    }
    .modal-add-row input, .modal-add-row select {
      height: 38px; padding: 0 12px;
      border: 1px solid var(--input-border); border-radius: 8px;
      background: var(--input-bg); color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border .15s;
    }
    .modal-add-row input:focus, .modal-add-row select:focus { border-color: var(--primary); }
    #modalInpKeyword { flex: 1; min-width: 140px; }
    #modalInpCountry { width: 150px; }

    /* Modal table */
    .modal-table-wrap { overflow-y: auto; flex: 1; }
    .modal-table-wrap table { width: 100%; }
    .modal-table-wrap tr:hover td { background: var(--row-hover); }
    .modal-table-wrap .empty-row td { padding: 36px 16px; }

    /* ── SPIN ── */
    .spin { display: inline-block; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <span class="header-title">RankPulse</span>
  </div>
  <img class="header-logo"
    src="https://assetscout.in/assets/images/Assetscout%20Logo%20Black.webp"
    alt="Asset Scout" onerror="this.style.display='none'">
  <div class="header-right">
    <a href="index.html" class="web-btn">Web</a>
    <div class="theme-toggle">
      <button class="theme-btn" id="btnLight" onclick="setTheme('light')" title="Light">☀️</button>
      <button class="theme-btn" id="btnDark"  onclick="setTheme('dark')"  title="Dark">🌙</button>
    </div>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <input type="text"     id="inpDomain"  placeholder="Domain (e.g. apple.com)"
    onkeypress="if(event.key==='Enter')addTracker()">
  <input type="text"     id="inpKeyword" placeholder="Keyword"
    onkeypress="if(event.key==='Enter')addTracker()">
  <select                id="inpCountry">
    <option value="us">🇺🇸 United States</option>
    <option value="gb">🇬🇧 United Kingdom</option>
    <option value="in">🇮🇳 India</option>
    <option value="ca">🇨🇦 Canada</option>
    <option value="au">🇦🇺 Australia</option>
    <option value="de">🇩🇪 Germany</option>
    <option value="fr">🇫🇷 France</option>
  </select>
  <button class="btn btn-primary" onclick="addTracker()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Add &amp; Check
  </button>

  <div class="key-wrap" style="margin-left:auto">
    <span class="key-status" id="keyStatus">✗</span>
    <input type="password" id="inpApiKey" placeholder="Paste SerpAPI key…"
      onblur="if(this.value.trim())saveApiKey(this.value.trim())"
      onkeydown="if(event.key==='Enter')saveApiKey()">
    <div class="divider"></div>
    <button class="btn btn-save" onclick="saveApiKey()">Save Key</button>
    <a href="https://serpapi.com/manage-api-key" target="_blank" rel="noopener"
      style="font-size:12px;color:var(--primary);text-decoration:underline;white-space:nowrap;padding-right:4px">Get free key</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card c-domains">
      <div class="stat-label">Total Domains</div>
      <div class="stat-value" id="statDomains">0</div>
    </div>
    <div class="stat-card c-keywords">
      <div class="stat-label">Total Keywords</div>
      <div class="stat-value" id="statKeywords">0</div>
    </div>
    <div class="stat-card c-top1">
      <div class="stat-label">Top 1 Ranking</div>
      <div class="stat-value" id="statTop1">0</div>
    </div>
    <div class="stat-card c-top10">
      <div class="stat-label">Top 10 Rankings</div>
      <div class="stat-value" id="statTop10">0</div>
    </div>
  </div>

  <!-- DOMAINS TABLE -->
  <div class="table-card">
    <div class="table-card-header">
      <span class="table-card-title">Domains</span>
      <button class="btn btn-secondary btn-sm" onclick="refreshAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Refresh All
      </button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Domain</th>
            <th>Keywords</th>
            <th>Best Position</th>
            <th>Last Checked</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="domainTableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- DOMAIN DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title">
        <span class="modal-domain-icon">🌐</span>
        <span id="modalDomainTitle">—</span>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>

    <!-- Add keyword row -->
    <div class="modal-add-row">
      <input type="text" id="modalInpKeyword" placeholder="New keyword…"
        onkeypress="if(event.key==='Enter')addModalKeyword()">
      <select id="modalInpCountry">
        <option value="us">🇺🇸 United States</option>
        <option value="gb">🇬🇧 United Kingdom</option>
        <option value="in">🇮🇳 India</option>
        <option value="ca">🇨🇦 Canada</option>
        <option value="au">🇦🇺 Australia</option>
        <option value="de">🇩🇪 Germany</option>
        <option value="fr">🇫🇷 France</option>
      </select>
      <button class="btn btn-add-kw" onclick="addModalKeyword()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Add Keyword
      </button>
    </div>

    <!-- Keywords table inside modal -->
    <div class="modal-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Keyword</th>
            <th>Country</th>
            <th>Position</th>
            <th>Last Checked</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="modalTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── STATE ───────────────────────────────────────────────
  let trackers = [];  // [{id, domain, keyword, country, pos, checked}]
  let apiKey = '';
  let activeDomain = null;
  let isRefreshing = false;

  const FLAGS = { us:'🇺🇸', gb:'🇬🇧', in:'🇮🇳', ca:'🇨🇦', au:'🇦🇺', de:'🇩🇪', fr:'🇫🇷' };
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ── THEME ───────────────────────────────────────────────
  function setTheme(t){
    document.documentElement.classList.toggle('dark', t==='dark');
    localStorage.setItem('rp_theme', t);
    document.getElementById('btnLight').classList.toggle('active', t==='light');
    document.getElementById('btnDark').classList.toggle('active', t==='dark');
  }
  (function(){ setTheme(localStorage.getItem('rp_theme')||'light'); })();

  // ── TOAST ───────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type='success'){
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>{ el.className='toast'; }, 3200);
  }

  // ── PERSIST (Google Sheets) ─────────────────────────────
  // Fire-and-forget save to sheet after every mutation
  async function autoSave(){
    try{
      await fetch('/api/save-trackers',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(trackers)
      });
    }catch(err){
      console.error('Sheet save failed:', err.message);
      showToast('Sheet sync failed: '+err.message,'error');
    }
  }
  // All existing code calls save() — keep alias
  function save(){ autoSave(); }

  async function load(){
    const tbody = document.getElementById('domainTableBody');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5"><span class="spin">↻</span> Loading from Google Sheets…</td></tr>';
    try{
      const res = await fetch('/api/get-trackers');
      if(!res.ok) throw new Error('HTTP ' + res.status);
      trackers = await res.json();
    }catch(err){
      trackers = [];
      showToast('Could not load from Sheets: ' + err.message, 'error');
    }
    apiKey = localStorage.getItem('rp_apikey')||'';
    const inp = document.getElementById('inpApiKey');
    if(inp) inp.value = apiKey ? '••••••••••••' : '';
    updateKeyStatus();
    render();
  }
  function updateKeyStatus(){
    document.getElementById('keyStatus').textContent = apiKey ? '✓' : '✗';
    document.getElementById('keyStatus').style.color = apiKey ? '#16a34a' : '#dc2626';
  }
  function saveApiKey(val){
    const k = val !== undefined ? val : document.getElementById('inpApiKey').value.trim();
    if(!k){ showToast('Enter a valid SerpAPI key','error'); return; }
    apiKey = k;
    localStorage.setItem('rp_apikey', apiKey);
    updateKeyStatus();
    showToast('API key saved ✓');
  }

  // ── DOMAIN GROUPS ───────────────────────────────────────
  function getDomainGroups(){
    const map = new Map();
    for(const t of trackers){
      if(!map.has(t.domain)) map.set(t.domain, []);
      map.get(t.domain).push(t);
    }
    return Array.from(map.entries()).map(([domain, kws])=>{
      const positions = kws.map(k=>k.pos).filter(p=>p!=null && p>0);
      const best = positions.length ? Math.min(...positions) : null;
      const allNull  = kws.every(k=>k.pos===null);
      const anyNeg   = kws.some(k=>k.pos===-1);
      const lastChecked = kws.map(k=>k.checked).filter(Boolean).sort().at(-1)||null;
      return { domain, kws, best, allNull, anyNeg, lastChecked };
    });
  }

  // ── STATS ───────────────────────────────────────────────
  function updateStats(){
    const groups = getDomainGroups();
    document.getElementById('statDomains').textContent  = groups.length;
    document.getElementById('statKeywords').textContent = trackers.length;
    document.getElementById('statTop1').textContent     = trackers.filter(t=>t.pos===1).length;
    document.getElementById('statTop10').textContent    = trackers.filter(t=>t.pos!=null&&t.pos>=1&&t.pos<=10).length;
  }

  // ── POSITION DISPLAY ────────────────────────────────────
  function posDisplay(pos, anyChecking){
    if(anyChecking) return '<span style="font-size:13px;color:var(--text-muted)"><span class="spin">↻</span> Checking…</span>';
    if(pos===null||pos===undefined) return '<span class="pos-pending">Pending</span>';
    if(pos===-1)  return '<span class="pos-notfound">Not found</span>';
    return `<span class="pos-text">#${pos}</span>`;
  }

  // ── RENDER DOMAINS TABLE ────────────────────────────────
  function render(){
    const groups = getDomainGroups();
    const tbody  = document.getElementById('domainTableBody');
    if(!groups.length){
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No domains tracked yet. Add a domain and keyword above.</td></tr>';
      updateStats(); return;
    }
    tbody.innerHTML = groups.map(g => {
      const anyChecking = g.kws.some(k=>k.pos===0);
      const bestHtml = posDisplay(g.best, anyChecking);
      const time = g.lastChecked ? new Date(g.lastChecked).toLocaleString() : 'Never';
      return `<tr class="domain-row" onclick="openModal('${esc(g.domain)}')">
        <td><div class="domain-name">
          <span class="domain-icon">🌐</span>
          <span>${esc(g.domain)}</span>
          <span class="chevron">›</span>
        </div></td>
        <td><span class="kw-badge">${g.kws.length} keyword${g.kws.length!==1?'s':''}</span></td>
        <td>${bestHtml}</td>
        <td class="time-cell">${time}</td>
        <td onclick="event.stopPropagation()" class="actions-cell" style="justify-content:flex-end">
          <button class="btn btn-icon btn-ghost" title="Refresh domain" onclick="refreshDomain('${esc(g.domain)}')">
            ${anyChecking?'<span class="spin">↻</span>':'↻'}
          </button>
        </td>
      </tr>`;
    }).join('');
    updateStats();
    if(activeDomain) renderModal();
  }

  // ── MODAL ───────────────────────────────────────────────
  function openModal(domain){
    activeDomain = domain;
    document.getElementById('modalDomainTitle').textContent = domain;
    document.getElementById('modalOverlay').classList.add('open');
    renderModal();
  }
  function closeModalDirect(){
    document.getElementById('modalOverlay').classList.remove('open');
    activeDomain = null;
    document.getElementById('modalInpKeyword').value = '';
  }
  function closeModal(e){
    if(e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }
  function renderModal(){
    if(!activeDomain) return;
    const kws = trackers.filter(t=>t.domain===activeDomain);
    const tbody = document.getElementById('modalTableBody');
    if(!kws.length){
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No keywords yet. Add one above.</td></tr>';
      return;
    }
    tbody.innerHTML = kws.map(t=>{
      const isChecking = t.pos===0;
      const flag = FLAGS[t.country]||'🌐';
      const posHtml = posDisplay(t.pos===0?null:t.pos, isChecking);
      const time = t.checked ? new Date(t.checked).toLocaleString() : 'Never';
      return `<tr>
        <td style="font-weight:600">${esc(t.keyword)}</td>
        <td>${flag} <span style="font-size:12px;color:var(--text-muted)">${t.country.toUpperCase()}</span></td>
        <td>${posHtml}</td>
        <td class="time-cell">${time}</td>
        <td class="actions-cell" style="justify-content:flex-end">
          <button class="btn btn-icon btn-ghost" title="Check rank" onclick="checkOne('${t.id}')">
            ${isChecking?'<span class="spin">↻</span>':'↻'}
          </button>
          <button class="btn btn-icon btn-danger" title="Delete" onclick="deleteOne('${t.id}')">✕</button>
        </td>
      </tr>`;
    }).join('');
  }

  // ── ADD (top bar — new domain+keyword) ──────────────────
  async function addTracker(){
    let domain  = document.getElementById('inpDomain').value.trim();
    let keyword = document.getElementById('inpKeyword').value.trim();
    let country = document.getElementById('inpCountry').value;
    if(!domain||!keyword){ showToast('Enter domain and keyword','error'); return; }
    domain = domain.replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0].toLowerCase();
    if(trackers.some(t=>t.domain===domain&&t.keyword===keyword&&t.country===country)){
      showToast('This tracker already exists','error'); return;
    }
    const id = Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    trackers.push({ id, domain, keyword, country, pos: null, checked: null });
    save(); render();
    document.getElementById('inpKeyword').value = '';
    showToast('Tracker added');
    if(apiKey) await checkOne(id);
  }

  // ── ADD KEYWORD (modal — uses activeDomain) ──────────────
  async function addModalKeyword(){
    const keyword = document.getElementById('modalInpKeyword').value.trim();
    const country = document.getElementById('modalInpCountry').value;
    if(!keyword){ showToast('Enter a keyword','error'); return; }
    if(!activeDomain){ return; }
    if(trackers.some(t=>t.domain===activeDomain&&t.keyword===keyword&&t.country===country)){
      showToast('This keyword already exists for this domain','error'); return;
    }
    const id = Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    trackers.push({ id, domain: activeDomain, keyword, country, pos: null, checked: null });
    save(); render();
    document.getElementById('modalInpKeyword').value = '';
    showToast('Keyword added');
    if(apiKey) await checkOne(id);
  }

  // ── DELETE ──────────────────────────────────────────────
  function deleteOne(id){
    trackers = trackers.filter(t=>t.id!==id);
    save(); render();
    showToast('Removed');
  }

  // ── CHECK ONE ───────────────────────────────────────────
  async function checkOne(id){
    if(!apiKey){ showToast('Save a SerpAPI key first','error'); return; }
    const t = trackers.find(x=>x.id===id);
    if(!t) return;
    t.pos = 0; render();
    try{
      const res = await fetch('/api/check-rank',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ apiKey, keyword:t.keyword, domain:t.domain, country:t.country })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error||'API error');
      t.pos     = data.position;
      t.checked = data.checkedAt;
      save(); render();
      showToast(t.pos===-1
        ? `"${t.keyword}" — not in top 100`
        : `"${t.keyword}" → #${t.pos}`);
    }catch(err){
      t.pos = null; render();
      showToast(err.message,'error');
    }
  }

  // ── REFRESH DOMAIN ──────────────────────────────────────
  async function refreshDomain(domain){
    if(!apiKey){ showToast('Save a SerpAPI key first','error'); return; }
    const kws = trackers.filter(t=>t.domain===domain);
    for(const t of kws) await checkOne(t.id);
  }

  // ── REFRESH ALL ─────────────────────────────────────────
  async function refreshAll(){
    if(!apiKey){ showToast('Save a SerpAPI key first','error'); return; }
    if(isRefreshing){ showToast('Already refreshing…','error'); return; }
    if(!trackers.length){ showToast('No trackers to refresh','error'); return; }
    isRefreshing = true;
    showToast(`Checking ${trackers.length} keyword${trackers.length!==1?'s':''}…`);
    for(const t of trackers){
      t.pos = 0; render();
      try{
        const res = await fetch('/api/check-rank',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ apiKey, keyword:t.keyword, domain:t.domain, country:t.country })
        });
        const data = await res.json();
        if(res.ok){ t.pos=data.position; t.checked=data.checkedAt; save(); render(); }
        await new Promise(r=>setTimeout(r,1100));
      }catch{ t.pos=null; render(); }
    }
    isRefreshing = false;
    showToast('All rankings updated ✓');
  }

  load();
</script>
</body>
</html>
